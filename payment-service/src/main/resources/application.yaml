server:
  port: 8083

spring:
  application:
    name: PAYMENT-SERVICE

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true


logging:
  level:
    org.springframework.web: DEBUG

  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger - correlationId=%X{correlationId} - %msg%n"